{% load order_tags %}
<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <title>門市已選擇</title>
  <style>
    body { margin:0; display:flex; align-items:center; justify-content:center;
           min-height:100vh; background:#f8f8f8; font-family:'Open Sans',sans-serif; }
    .card { background:#fff; border-radius:8px; box-shadow:0 4px 20px rgba(0,0,0,.12);
            padding:32px; text-align:center; max-width:360px; width:90%; }
    .check { width:56px; height:56px; background:#f0fdf4; border-radius:50%;
             display:flex; align-items:center; justify-content:center;
             font-size:28px; margin:0 auto 16px; }
    h2 { font-size:17px; font-weight:700; color:#333; margin:0 0 8px; }
    p  { font-size:13px; color:#666; margin:0 0 4px; }
    .store-name { font-size:15px; font-weight:600; color:#8f9b34; margin:12px 0 4px; }
    .addr { font-size:12px; color:#999; }
  </style>
</head>
<body>
  <div class="card">
    {% if error %}
      <div style="font-size:32px;margin-bottom:12px;">⚠️</div>
      <h2>驗證失敗</h2>
      <p>{{ error }}</p>
    {% else %}
      <div class="check">✅</div>
      <h2>門市已選擇</h2>
      {% if store %}
        <p class="store-name">{{ store.cvs_store_name }}</p>
        <p class="addr">{{ store.cvs_address }}</p>
      {% endif %}
      <p style="margin-top:16px;color:#aaa;font-size:12px;">此視窗將自動關閉…</p>
    {% endif %}
  </div>

  <script>
    {% if not error and store %}
    // Notify the opener window with store data, then close
    var store = {{ store|safe_json }};
    var tradeNo = "{{ trade_no }}";

    if (window.opener && !window.opener.closed) {
      window.opener.postMessage({
        type: 'cvs_store_selected',
        tradeNo: tradeNo,
        store: store
      }, '*');
    }
    setTimeout(function() { window.close(); }, 1500);
    {% endif %}
  </script>
</body>
</html>
