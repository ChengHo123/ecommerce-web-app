<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>選擇{{ form.cvs_label }}門市</title>
  <style>
    body { margin:0; display:flex; align-items:center; justify-content:center;
           min-height:100vh; background:#f8f8f8; font-family:'Open Sans',sans-serif; }
    .card { background:#fff; border-radius:8px; box-shadow:0 4px 20px rgba(0,0,0,.12);
            padding:32px; text-align:center; max-width:360px; width:90%; }
    .spinner { width:40px; height:40px; border:3px solid #e0e0e0;
               border-top-color:#8f9b34; border-radius:50%;
               animation:spin .8s linear infinite; margin:0 auto 16px; }
    @keyframes spin { to { transform:rotate(360deg); } }
    p { color:#666; font-size:14px; margin:0; }
  </style>
</head>
<body>
  <div class="card">
    <div class="spinner"></div>
    <p>正在跳轉到 {{ form.cvs_label }} 門市選擇頁面…</p>
  </div>

  <!-- Auto-submit form to ECPay map -->
  <form id="ecpay-form" method="POST" action="{{ form.action_url }}">
    {% for name, value in form.fields %}
      <input type="hidden" name="{{ name }}" value="{{ value }}">
    {% endfor %}
  </form>

  <script>
    // Auto-submit after a short delay so user sees the loading state
    setTimeout(function() {
      document.getElementById('ecpay-form').submit();
    }, 600);
  </script>
</body>
</html>
