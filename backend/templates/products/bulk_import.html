{% extends "base.html" %}

{% block title %}批量匯入商品{% endblock %}

{% block content %}
<div class="max-w-xl mx-auto px-4 py-10">
  <h1 class="text-2xl font-bold text-gray-800 mb-2">批量匯入商品</h1>
  <p class="text-gray-500 text-sm mb-6">上傳 Shopline 格式的 Excel 檔案 (.xlsx)</p>

  <div class="bg-white rounded-2xl shadow-sm border p-6">
    <form method="post" enctype="multipart/form-data" action="/admin-tools/bulk-import/">
      {% csrf_token %}
      <div class="border-2 border-dashed border-gray-300 rounded-xl p-8 text-center mb-4 hover:border-green-400 transition">
        <div class="text-4xl mb-3">📊</div>
        <label class="cursor-pointer">
          <span class="text-green-600 hover:underline font-medium">選擇檔案</span>
          <input type="file" name="file" accept=".xlsx,.xls" required class="sr-only" id="file-input"
                 onchange="document.getElementById('filename').textContent = this.files[0]?.name || ''">
        </label>
        <p class="text-gray-400 text-xs mt-1">或拖曳至此處</p>
        <p id="filename" class="text-sm text-gray-600 mt-2"></p>
      </div>
      <button type="submit" class="w-full bg-green-600 text-white py-3 rounded-xl font-semibold hover:bg-green-700 transition">
        開始匯入
      </button>
    </form>
    <a href="/admin/" class="block text-center mt-4 text-sm text-gray-400 hover:text-gray-600">← 回到管理後台</a>
  </div>
</div>
{% endblock %}
